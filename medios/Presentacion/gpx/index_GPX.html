<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recorrido Wikiloc con Fotos</title>

<link rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    padding:0;
    height:100%;
}

#map{
    width:100%;
    height:100vh;
}

.popup-img{
    max-width:250px;
    border-radius:8px;
    margin-top:5px;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/@tmcw/togeojson@5.8.1/dist/togeojson.umd.js"></script>

<script>

// =====================================
// GPX RUTA (PEGAR AQUÍ EL GPX COMPLETO)
// =====================================

const gpxRuta1 = `<?xml version="1.0" encoding="UTF-8"?>
<!-- PEGAR AQUÍ EL CONTENIDO COMPLETO DE Ruta1.gpx -->
`;

// =====================================
// GPX PUNTOS CON FOTOS
// =====================================
const gpxPuntos = `<?xml version="1.0"?>
<gpx xmlns="http://topografix.com"
version="1.1"
creator="ChatGPT">

<wpt lat="7.271072" lon="-72.641945">
<name>Punto 1</name>
<desc>Imagen asociada: imagenes/punto1.jpg</desc>
<link href="imagenes/punto1.jpg"/>
</wpt>

<wpt lat="7.265815" lon="-72.640173">
<name>Punto 2</name>
<desc>Imagen asociada: imagenes/punto2.jpg</desc>
<link href="imagenes/punto2.jpg"/>
</wpt>

<wpt lat="7.264428" lon="-72.641356">
<name>Punto 3</name>
<desc>Imagen asociada: imagenes/punto3.jpg</desc>
<link href="imagenes/punto3.jpg"/>
</wpt>

<wpt lat="7.268928" lon="-72.644627">
<name>Punto 4</name>
<desc>Imagen asociada: imagenes/punto4.jpg</desc>
<link href="imagenes/punto4.jpg"/>
</wpt>

<wpt lat="7.271794" lon="-72.646360">
<name>Punto 5</name>
<desc>Imagen asociada: imagenes/punto5.jpg</desc>
<link href="imagenes/punto5.jpg"/>
</wpt>

<wpt lat="7.274166" lon="-72.641787">
<name>Planta de Tratamiento</name>
<desc>Imagen asociada: imagenes/planta.jpg</desc>
<link href="imagenes/planta.jpg"/>
</wpt>

<wpt lat="7.303206" lon="-72.658707">
<name>Fuente 1</name>
<desc>Imagen asociada: imagenes/fuente1.jpg</desc>
<link href="imagenes/fuente1.jpg"/>
</wpt>

<wpt lat="7.287907" lon="-72.646068">
<name>Fuente 2</name>
<desc>Imagen asociada: imagenes/fuente2.jpg</desc>
<link href="imagenes/fuente2.jpg"/>
</wpt>



</gpx>`;

// =====================================
// MAPA
// =====================================

const map = L.map("map").setView(
    [7.303,-72.658],
    14
);

const bounds = L.latLngBounds();

// Satélite

L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
    attribution:'Tiles © Esri',
    maxZoom:20
}
).addTo(map);

// Relieve

L.tileLayer(
'https://tiles.wmflabs.org/hillshading/{z}/{x}/{y}.png',
{
    attribution:'Relieve © Wikimedia',
    opacity:0.4
}
).addTo(map);

// =====================================
// PROCESAR GPX
// =====================================

function procesarGPX(gpxText){

    const parser = new DOMParser();

    const gpx = parser.parseFromString(
        gpxText,
        "application/xml"
    );

    if(gpx.querySelector("parsererror")){
        console.error("GPX inválido");
        return;
    }

    const geojson = toGeoJSON.gpx(gpx);

    // -------------------------------
    // TRACKS
    // -------------------------------

    const lineFeatures =
        geojson.features.filter(f =>
            f.geometry &&
            (
                f.geometry.type==="LineString" ||
                f.geometry.type==="MultiLineString"
            )
        );

    if(lineFeatures.length){

        const layer = L.geoJSON(
        {
            type:"FeatureCollection",
            features:lineFeatures
        },
        {
            style:{
                color:"#ff00ff",
                weight:5,
                opacity:0.9
            }
        }
        ).addTo(map);

        bounds.extend(
            layer.getBounds()
        );
    }

    // -------------------------------
    // WAYPOINTS
    // -------------------------------

    const wpts =
        gpx.getElementsByTagNameNS(
            "*",
            "wpt"
        );

    for(let i=0;i<wpts.length;i++){

        const lat =
            parseFloat(
                wpts[i].getAttribute("lat")
            );

        const lon =
            parseFloat(
                wpts[i].getAttribute("lon")
            );

        const nameNode =
            wpts[i]
            .getElementsByTagNameNS(
                "*",
                "name"
            )[0];

        const descNode =
            wpts[i]
            .getElementsByTagNameNS(
                "*",
                "desc"
            )[0];

        const linkNode =
            wpts[i]
            .getElementsByTagNameNS(
                "*",
                "link"
            )[0];

        const name =
            nameNode
            ? nameNode.textContent
            : `Punto ${i+1}`;

        const desc =
            descNode
            ? descNode.textContent
            : "";

        let popup =
            `<strong>${name}</strong>`;

        if(desc){
            popup += `<br>${desc}`;
        }

        if(linkNode){

            const href =
                linkNode.getAttribute(
                    "href"
                );

            if(href){

                popup += `
                <br><br>
                <img
                    class="popup-img"
                    src="${href}">
                <br>
                <a href="${href}"
                   target="_blank">
                   Ver imagen completa
                </a>`;
            }
        }

        const marker =
            L.marker([lat,lon])
            .addTo(map)
            .bindPopup(popup);

        bounds.extend(
            marker.getLatLng()
        );
    }
}

// =====================================
// EJECUTAR
// =====================================

procesarGPX(gpxRuta1);
procesarGPX(gpxPuntos);

// =====================================
// AJUSTAR MAPA
// =====================================

setTimeout(()=>{

    if(bounds.isValid()){

        map.fitBounds(
            bounds,
            {
                padding:[40,40]
            }
        );
    }

},500);

</script>

</body>
</html>
